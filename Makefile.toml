[tasks.dist]
description = "Build a release bundle into the docs/ directory for GitHub Pages deployment"
command = "dx"
args = ["bundle", "--release", "--out-dir", "docs"]

[tasks.copy-404]
description = "Copy index.html to 404.html for GitHub Pages client-side routing"
dependencies = ["dist"]
script_runner = "powershell"
script_extension = "ps1"
script = 'cp docs/public/index.html docs/public/404.html'

[tasks.deploy]
description = "Full GitHub Pages deployment build"
dependencies = ["copy-404"]
